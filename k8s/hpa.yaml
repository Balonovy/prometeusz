apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prometeusz-api
  namespace: prometeusz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prometeusz-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
