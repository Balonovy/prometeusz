services:
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - '8000:8000'
    depends_on:
      - redis
    volumes:
      - ..:/app
    command: uvicorn interfaces.api.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
