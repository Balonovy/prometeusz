apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometeusz-watchdog
  namespace: prometeusz
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometeusz-watchdog}
  template:
    metadata:
      labels: {app: prometeusz-watchdog}
    spec:
      containers:
        - name: watchdog
          image: prometeusz:latest
          command: ["python", "-m", "neural_os.watchdog"]
